<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camera Man (Speed Optimized)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        body { font-family: sans-serif; }
        .video-container {
            position: relative;
            display: inline-block;
            overflow: hidden; 
            width: 100%; 
        }
        #videoElement {
            width: 100%; 
            height: auto;
            display: block;
            /* ตั้งค่าเริ่มต้นสำหรับการฟลิปกล้องหน้า (จะถูกกำหนดด้วย JS เมื่อเริ่มกล้อง) */
            transform: scaleX(-1);
        }
        #canvasOverlay {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: none; 
            /* ตั้งค่าเริ่มต้นสำหรับการฟลิป Canvas (จะถูกกำหนดด้วย JS เมื่อเริ่มกล้อง) */
            transform: scaleX(-1);
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-success fixed-top shadow-lg">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Intelligent LeafScanner</a>
            
            <button id="cameraSwitchButton" class="btn btn-sm btn-outline-light" type="button" style="display: none;">
                <i class="bi bi-camera-switch fs-4"></i>
            </button>
            </div>
    </nav>
    
    <div style="height: 60px;"></div> 

    <div class="container mt-4">
        <div id="camera_section">
            <h1 class="text-center mb-4 text-success fw-bold">ตรวจจับโรคใบพืช</h1>
            
            <div class="card shadow-lg mx-auto" style="max-width: 640px;">
                <div class="card-body p-0"> 
                    <div class="video-container" id="video-wrapper">
                        <video id="videoElement" autoplay playsinline></video>
                        <canvas id="canvasOverlay"></canvas>
                    </div>
                </div>
                
                <div class="card-footer text-center p-3 bg-white">
                    <button id="startButton" class="btn btn-primary btn-lg w-100 shadow-sm">
                        <i class="bi bi-camera-video"></i> เริ่มตรวจจับ
                    </button>
                    <p id="status" class="mt-3 fs-6 fw-bold text-info">รอการเริ่ม...</p>
                    <p id="connectionStatus" class="mt-2 fs-6 fw-bold text-danger">สถานะ API: กำลังตรวจสอบ...</p> 
                    <p id="detectionCount" class="text-muted small">ตรวจพบ: 0</p>
                </div>
            </div>
        </div>
        
        <div id="results_history" class="container mt-5 p-4 border rounded bg-white shadow-sm">
            <h2 class="text-primary"><i class="bi bi-list-columns"></i> ประวัติผลลัพธ์ล่าสุด</h2>
            <p class="text-muted">ไม่พบการตรวจจับในขณะนี้</p>
        </div>
    </div> 
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

    <script>
    
    // *** การตั้งค่า API ***
    const BASE_API_URL = "https://tawanna-ionogenic-gyrally.ngrok-free.dev"; 
    const API_URL = `${BASE_API_URL}/detect_disease`; 
    
    const AI_INPUT_SIZE = 680; 
    
    // 🎯 Mapping ชื่อคลาสภาษาอังกฤษเป็นชื่อโรคภาษาไทย (ตามที่คุณแจ้งมา)
    const CLASS_NAME_MAPPING = {
        'agal-spot': 'ใบจุด (Agal Spot)', 
        'blight leaf': 'ใบไหม้ (Blight Leaf)', 
        'healthy': 'ใบปกติ/ไม่พบโรค', 
    };

    // Element References
    const video = document.getElementById('videoElement');
    const canvas = document.getElementById('canvasOverlay');
    const videoWrapper = document.getElementById('video-wrapper');
    const startButton = document.getElementById('startButton');
    const cameraSwitchButton = document.getElementById('cameraSwitchButton'); 
    const statusElement = document.getElementById('status');
    const detectionCountElement = document.getElementById('detectionCount');
    const connectionStatusElement = document.getElementById('connectionStatus');
    const historySection = document.getElementById('results_history');
    const ctx = canvas.getContext('2d');
    
    // Global State Variables
    let stream = null;
    let isProcessing = false;
    let isBackendConnected = false;
    let currentFacingMode = 'environment'; 
    
    let latestDetectionData = { 
        boxes: [], 
        detections: 0 
    }; 

    // 💡 แก้ไข: เพิ่มช่วงเวลาเป็น 600ms เพื่อหลีกเลี่ยง Ngrok Rate Limit (100 คำขอ/นาที)
    let frameSendInterval = 600; 
    let lastSendTime = 0; 

    // ----------------------------------------------------------------------
    // ** 1. ฟังก์ชันหลัก: Loop การ Render 60 FPS **
    // ----------------------------------------------------------------------
    function drawLoop() {
        if (!isProcessing) return; 
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawBoundingBoxes(latestDetectionData.boxes); 

        const now = performance.now();
        if (now - lastSendTime >= frameSendInterval) {
            sendFrame(now); 
            lastSendTime = now;
        }

        requestAnimationFrame(drawLoop);
    }

    // ----------------------------------------------------------------------
    // ** 2. ฟังก์ชันวาดกล่อง Bounding Boxes (แก้ไข Logic การฟลิป) **
    // ----------------------------------------------------------------------
    function drawBoundingBoxes(boxes) {
        if (!boxes || boxes.length === 0) return;

        const scaleX = canvas.width / AI_INPUT_SIZE;
        const scaleY = canvas.height / AI_INPUT_SIZE;
        
        // ตรวจสอบการฟลิปจาก JS State
        const isMirroredCSS = currentFacingMode === 'user'; 

        ctx.lineWidth = 3; 
        ctx.font = 'bold 16px Arial'; 
        ctx.textAlign = 'start';
        ctx.strokeStyle = '#dc3545';
        ctx.fillStyle = '#dc3545'; 

        boxes.forEach(detection => {
            const [x1_ai, y1_ai, x2_ai, y2_ai] = detection.box; 
            const conf = detection.confidence;
            const englishName = detection.class;
            
            // 1. Scale พิกัดจาก AI (480x480) ให้ตรงกับ Canvas
            let x1_scaled = x1_ai * scaleX;
            const y1 = y1_ai * scaleY;
            let x2_scaled = x2_ai * scaleX;
            const y2 = y2_ai * scaleY;

            // 2. 💡 แก้ไข: ปรับตำแหน่ง X หากมีการฟลิปเพื่อวาดกรอบให้ตรง
            if (isMirroredCSS) {
                // คำนวณตำแหน่ง X ใหม่
                x1_scaled = canvas.width - x1_scaled;
                x2_scaled = canvas.width - x2_scaled;
                
                // สลับค่าเพื่อให้ x1 น้อยกว่า x2
                [x1_scaled, x2_scaled] = [Math.min(x1_scaled, x2_scaled), Math.max(x1_scaled, x2_scaled)];
            }
            
            // 3. คำนวณพิกัดสุดท้ายและขนาด
            const x1 = x1_scaled;
            const width = x2_scaled - x1_scaled;
            const height = y2 - y1;
            
            // วาดกรอบ
            ctx.strokeRect(x1, y1, width, height); 
            
            // วาดป้ายกำกับ
            const thaiName = CLASS_NAME_MAPPING[englishName.toLowerCase()] || englishName;
            const label = `${thaiName} (${(conf * 100).toFixed(0)}%)`; 
            
            const textWidth = ctx.measureText(label).width;
            ctx.fillRect(x1 - 1, y1 - 20, textWidth + 8, 20);
            
            ctx.fillStyle = 'white';
            ctx.fillText(label, x1 + 3, y1 - 5);
            ctx.fillStyle = '#dc3545'; 
        });
    }

    // ----------------------------------------------------------------------
    // ** 3. ฟังก์ชันอัปเดตประวัติผลลัพธ์ **
    // ----------------------------------------------------------------------
    function updateHistory(boxes) {
        let historyHtml = '<h2 class="text-primary"><i class="bi bi-list-columns"></i> ประวัติผลลัพธ์ล่าสุด</h2>';
        
        if (boxes.length === 0) {
            historyHtml += '<p class="text-muted">ไม่พบการตรวจจับในขณะนี้</p>';
        } else {
            historyHtml += '<ul class="list-group">';
            
            // 💡 ยังคงใช้ Set เพื่อแสดงรายการโรคที่ไม่ซ้ำกันในส่วน History
            const uniqueDetections = new Set();
            
            boxes.forEach(detection => {
                const englishName = detection.class;
                const confidence = detection.confidence;
                
                const thaiName = CLASS_NAME_MAPPING[englishName.toLowerCase()] || englishName;
                
                if (!uniqueDetections.has(thaiName)) {
                    const confidenceColor = confidence > 0.75 ? 'text-success' : confidence > 0.5 ? 'text-warning' : 'text-muted';
                    
                    historyHtml += `
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            <span class="fw-bold">พบ: ${thaiName}</span>
                            <span class="${confidenceColor} small">
                                มั่นใจ ${(confidence * 100).toFixed(1)}%
                            </span>
                        </li>
                    `;
                    uniqueDetections.add(thaiName);
                }
            });
            
            historyHtml += '</ul>';
        }
        
        historySection.innerHTML = historyHtml;
    }

    // ----------------------------------------------------------------------
    // ** 4. ฟังก์ชันการเชื่อมต่อและควบคุมกล้อง **
    // ----------------------------------------------------------------------
    
    async function checkBackendConnectivity() {
        try {
            connectionStatusElement.textContent = "สถานะ API: กำลังตรวจสอบ...";
            connectionStatusElement.classList.remove('text-success', 'text-danger');
            connectionStatusElement.classList.add('text-warning');

            const response = await fetch(BASE_API_URL, { method: 'GET' });

            if (response.ok || response.status === 404 || response.status === 405) {
                isBackendConnected = true;
                connectionStatusElement.textContent = "สถานะ API: เชื่อมต่อสำเร็จ (ออนไลน์)";
                connectionStatusElement.classList.remove('text-warning', 'text-danger');
                connectionStatusElement.classList.add('text-success');
                return true;
            } else {
                throw new Error(`Server responded with status: ${response.status}`);
            }

        } catch (error) {
            isBackendConnected = false;
            connectionStatusElement.textContent = `สถานะ API: ล้มเหลว! (${error.message})`;
            connectionStatusElement.classList.remove('text-warning', 'text-success');
            connectionStatusElement.classList.add('text-danger');
            statusElement.textContent = "ไม่สามารถเชื่อมต่อ Backend ได้";
            console.error("Backend Connection Check Failed:", error);
            return false;
        }
    }

    // 🛠️ NEW: ฟังก์ชันตั้งค่าการฟลิปวิดีโอ/Canvas
    function setCameraFlip(facingMode) {
        if (facingMode === 'user') {
            // กล้องหน้า: ฟลิป video และ canvas เพื่อให้เป็นกระจก
            video.style.transform = 'scaleX(-1)';
            canvas.style.transform = 'scaleX(-1)';
        } else {
            // กล้องหลัง/ค่าเริ่มต้น: ไม่ต้องฟลิป
            video.style.transform = 'none';
            canvas.style.transform = 'none';
        }
    }
    
    async function initializeCamera(constraints) {
        // ปิดกล้องปัจจุบันก่อนถ้ามี
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
        }
        try {
            const currentStream = await navigator.mediaDevices.getUserMedia(constraints);
            return currentStream;
        } catch (err) {
            console.warn(`Camera init failed with constraint: ${JSON.stringify(constraints)}`, err.name);
            return null;
        }
    }
    
    function setupVideoAndStartLoop(currentStream, facingMode) {
        return new Promise((resolve) => {
            stream = currentStream;
            video.srcObject = stream;

            video.load(); 

            video.onloadedmetadata = () => {
                video.play();
                
                // 🛠️ NEW: ตั้งค่าการฟลิปวิดีโอ/Canvas
                setCameraFlip(facingMode); 

                // 1. กำหนดขนาด 'เชิงกายภาพ' (Physical Size) ของ Canvas
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                // 2. กำหนดขนาด 'เชิงแสดงผล' (CSS Size) ของ Canvas ทันที
                const videoRect = video.getBoundingClientRect();
                canvas.style.width = `${videoRect.width}px`;
                canvas.style.height = `${videoRect.height}px`;
                
                // 3. กำหนดความสูงของ Container
                videoWrapper.style.height = `${videoRect.height}px`; 
                
                console.log(`Camera Stream Ready: ${canvas.width}x${canvas.height} | CSS: ${videoRect.width}px x ${videoRect.height}px`);

                statusElement.textContent = `กล้องพร้อมใช้งาน (${facingMode === 'user' ? 'หน้า' : 'หลัง'}) กำลังเริ่มตรวจจับ...`;
                startButton.textContent = "หยุดตรวจจับ";
                startButton.classList.remove('btn-primary');
                startButton.classList.add('btn-danger');
                cameraSwitchButton.style.display = 'block'; // แสดงปุ่มสลับกล้อง

                isProcessing = true;
                drawLoop(); 
                
                startButton.onclick = stopDetection;
                resolve();
            };
        });
    }

    async function startCamera(facingMode = currentFacingMode) {
        if (!isBackendConnected) {
            statusElement.textContent = "หยุด! Backend ยังไม่พร้อมใช้งาน";
            return false;
        }

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            statusElement.textContent = "ข้อผิดพลาด: เบราว์เซอร์ไม่รองรับ MediaDevices API";
            return false;
        }
        
        currentFacingMode = facingMode;
        statusElement.textContent = `กำลังเชื่อมต่อกล้อง (${facingMode === 'user' ? 'หน้า' : 'หลัง'})...`;

        const constraints = {
            video: {
                facingMode: facingMode
            }
        };
        
        let successfulStream = await initializeCamera(constraints);

        if (successfulStream) {
            await setupVideoAndStartLoop(successfulStream, facingMode);
            return true;
        } else {
            statusElement.textContent = `ข้อผิดพลาดร้ายแรง: ไม่สามารถเข้าถึงกล้อง (${facingMode}) ได้`;
            startButton.textContent = "เริ่มตรวจจับ (ผิดพลาด)";
            cameraSwitchButton.style.display = 'none'; 
            return false;
        }
    }

    function stopDetection() {
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
        }
        isProcessing = false;
        statusElement.textContent = "หยุดการตรวจจับแล้ว";
        startButton.textContent = "เริ่มตรวจจับ";
        startButton.classList.remove('btn-danger');
        startButton.classList.add('btn-primary');
        startButton.onclick = startDetectionProcess; 
        cameraSwitchButton.style.display = 'none'; 
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        latestDetectionData = { boxes: [], detections: 0 }; 
        updateHistory([]); 
        setCameraFlip('default'); 
    }

    // 🛠️ NEW: ฟังก์ชันสลับกล้อง
    async function switchCamera() {
        if (isProcessing) {
            stopDetection();
            // สลับโหมด: 'environment' -> 'user' หรือ 'user' -> 'environment'
            currentFacingMode = (currentFacingMode === 'environment') ? 'user' : 'environment';
            await startDetectionProcess();
        } else {
            // หากยังไม่เริ่ม แต่กดสลับ ก็สลับโหมดไว้รอ
            currentFacingMode = (currentFacingMode === 'environment') ? 'user' : 'environment';
        }
    }

    async function sendFrame(sendTime) {
        if (!isProcessing || video.paused || video.ended) {
            return;
        }

        try {
            const captureCanvas = document.createElement('canvas');
            const captureCtx = captureCanvas.getContext('2d');
            const CAPTURE_SIZE = AI_INPUT_SIZE; // 480
            captureCanvas.width = CAPTURE_SIZE;
            captureCanvas.height = CAPTURE_SIZE;

            // 🛠️ NEW: จัดการการฟลิปภาพสำหรับ AI ก่อนส่ง
            if (currentFacingMode === 'user') {
                // หากใช้กล้องหน้า เราต้องกลับภาพให้ AI เพื่อให้กล่องตรง (AI ไม่ต้องการภาพฟลิป)
                captureCtx.translate(CAPTURE_SIZE, 0);
                captureCtx.scale(-1, 1);
            }
            
            // วาดภาพวิดีโอลง Canvas เพื่อส่ง
            captureCtx.drawImage(video, 0, 0, video.videoWidth, video.videoHeight, 0, 0, CAPTURE_SIZE, CAPTURE_SIZE);
            
            // รีเซ็ต transform
            captureCtx.setTransform(1, 0, 0, 1, 0, 0);

            captureCanvas.toBlob(async (blob) => {
                if (!blob) return;

                const formData = new FormData();
                formData.append('file', blob, 'frame.jpg');

                statusElement.textContent = "กำลังส่งภาพและประมวลผล...";
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    statusElement.textContent = `ข้อผิดพลาด API: เซิร์ฟเวอร์ตอบกลับสถานะ ${response.status} (Backend/ngrok อาจปิดอยู่)`;
                    connectionStatusElement.textContent = `สถานะ API: ล้มเหลว! (${response.status})`;
                    console.error("HTTP Error from Backend:", response.status, errorText.substring(0, 100) + '...');
                    stopDetection();
                    return; 
                }

                let result;
                try {
                    result = await response.json();
                } catch (e) {
                    statusElement.textContent = `ข้อผิดพลาด API: รับข้อมูลที่ไม่ใช่ JSON (ngrok/Cloudflare Error?)`;
                    connectionStatusElement.textContent = `สถานะ API: ล้มเหลวในการอ่านข้อมูล`;
                    console.error("JSON Parsing Error:", e);
                    stopDetection();
                    return; 
                }

                let boxesData;
                let detectionCount;
                
                if (result.status === 'success') { 
                    const detectionsArray = result.detections;
                    if (detectionsArray && Array.isArray(detectionsArray)) {
                        boxesData = detectionsArray.map(d => ({
                            box: [d.box[0], d.box[1], d.box[2], d.box[3]], 
                            confidence: d.confidence,
                            class: d.class
                        }));
                        detectionCount = result.detections_count || boxesData.length;
                    } else {
                        boxesData = [];
                        detectionCount = 0;
                    }
                } else {
                    boxesData = [];
                    detectionCount = 0;
                }

                latestDetectionData = {
                    boxes: boxesData,
                    detections: detectionCount
                };
                
                updateHistory(boxesData);
                
                detectionCountElement.textContent = `ตรวจพบ: ${detectionCount} วัตถุ`;
                const processingTime = performance.now() - sendTime;
                statusElement.textContent = `ตรวจจับสำเร็จ! (Lat: ${processingTime.toFixed(0)}ms) - ${Math.round(1000/frameSendInterval)} FPS`;

            }, 'image/jpeg', 0.4); 

        } catch (error) {
            statusElement.textContent = `หยุดการเชื่อมต่อ: ไม่สามารถติดต่อเซิร์ฟเวอร์ได้`;
            connectionStatusElement.textContent = `สถานะ API: ล้มเหลวในการสื่อสาร`;
            console.error("Detection API Network Error:", error);
            
            isProcessing = false; 
            stopDetection();
        }
    }
    
    async function startDetectionProcess() {
        const isReady = await checkBackendConnectivity(); 
        if (isReady) {
            isProcessing = true;
            startCamera(currentFacingMode); 
        } else {
            isProcessing = false;
        }
    };

    startButton.onclick = startDetectionProcess;
    cameraSwitchButton.onclick = switchCamera; 

    window.onload = async function() {
        statusElement.textContent = "กรุณาเปิดกล้องและเริ่มตรวจจับ";
        await checkBackendConnectivity(); 
    };

    window.addEventListener('beforeunload', () => {
        stopDetection();
    });

    </script>
</body>
</html>
